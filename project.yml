name: AmbientMindfulness
options:
  bundleIdPrefix: com.paulkernfeld
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  AmbientMindfulness:
    type: application
    platform: iOS
    sources:
      - path: AmbientMindfulness
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.paulkernfeld.ambientmindfulness
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: "AmbientMindfulness Watch App"

  AmbientMindfulness Watch App:
    type: application
    platform: watchOS
    sources:
      - path: "AmbientMindfulness Watch App"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.paulkernfeld.ambientmindfulness.watchkitapp
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.paulkernfeld.ambientmindfulness
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  AmbientMindfulnessTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AmbientMindfulnessTests
    dependencies:
      - target: AmbientMindfulness
