name: AmbientMindfulness
options:
  bundleIdPrefix: com.paulkernfeld
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  AmbientMindfulness:
    type: application
    platform: iOS
    sources:
      - path: AmbientMindfulness
      - path: Shared
    dependencies:
      - target: "AmbientMindfulness Watch App"

  AmbientMindfulness Watch App:
    type: application
    platform: watchOS
    sources:
      - path: "AmbientMindfulness Watch App"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.paulkernfeld.AmbientMindfulness.watchkitapp

  AmbientMindfulnessTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AmbientMindfulnessTests
      - path: Shared
    dependencies:
      - target: AmbientMindfulness
