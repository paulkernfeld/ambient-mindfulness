name: Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Boot simulator
        run: |
          # Find any available iPhone simulator and boot it
          SIM_ID=$(xcrun simctl list devices available -j \
            | python3 -c "import json,sys; devs=json.load(sys.stdin)['devices']; print(next(d['udid'] for ds in devs.values() for d in ds if 'iPhone' in d['name'] and d['isAvailable']))")
          xcrun simctl boot "$SIM_ID"
          echo "SIM_ID=$SIM_ID" >> "$GITHUB_ENV"

      - name: Run tests
        run: |
          xcodebuild test \
            -project AmbientMindfulness.xcodeproj \
            -scheme AmbientMindfulness \
            -destination "platform=iOS Simulator,id=$SIM_ID" \
            CODE_SIGNING_ALLOWED=NO

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: macos-15
    env:
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
        env:
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}

      - name: Archive iOS app (with embedded watchOS app)
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          xcodebuild archive \
            -project AmbientMindfulness.xcodeproj \
            -scheme AmbientMindfulness \
            -archivePath build/AmbientMindfulness.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

      - name: Export and upload to TestFlight
        run: |
          xcodebuild -exportArchive \
            -archivePath build/AmbientMindfulness.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8 \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            2>&1 | tee /tmp/export.log
          # Verify upload actually succeeded — fragile string match but
          # catches silent failures like duplicate build numbers.
          # If Apple changes the message, update this grep.
          grep -q "Upload succeeded" /tmp/export.log
